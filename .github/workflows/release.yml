name: "Release"

on:
  push:
    branches:
      - main

concurrency:
  group: release-main
  cancel-in-progress: true

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release_please:
    name: Release Please
    runs-on: ubuntu-latest
    outputs:
      agpod_tag_name: ${{ steps.release.outputs['crates/agpod--tag_name'] }}
      agpod_release_created: ${{ steps.release.outputs['crates/agpod--release_created'] }}
      agpod_mcp_tag_name: ${{ steps.release.outputs['crates/agpod-mcp--tag_name'] }}
      agpod_mcp_release_created: ${{ steps.release.outputs['crates/agpod-mcp--release_created'] }}
      agpod_case_server_tag_name: ${{ steps.release.outputs['crates/agpod-case-server--tag_name'] }}
      agpod_case_server_release_created: ${{ steps.release.outputs['crates/agpod-case-server--release_created'] }}
    steps:
      - name: Run release-please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Print release outputs for debugging
        continue-on-error: true
        run: |
          echo "Release outputs:"
          echo "${{ toJson(steps.release.outputs) }}"

  build_artifacts:
    name: Build Artifacts
    needs: release_please
    if: ${{ needs.release_please.outputs.agpod_release_created == 'true' }}
    uses: ./.github/workflows/build-artifacts.yml
    with:
      tag_name: ${{ needs.release_please.outputs.agpod_tag_name }}
      bin_name: agpod

  build_artifacts_agpod_mcp:
    name: Build Artifacts agpod-mcp
    needs: release_please
    if: ${{ needs.release_please.outputs.agpod_mcp_release_created == 'true' }}
    uses: ./.github/workflows/build-artifacts.yml
    with:
      tag_name: ${{ needs.release_please.outputs.agpod_mcp_tag_name }}
      bin_name: agpod-mcp
      smoke_test_command: |
        npx -y @modelcontextprotocol/inspector --cli --transport stdio --method tools/list target/aarch64-apple-darwin/release/agpod-mcp > /tmp/agpod-mcp-tools-list.json
        test -s /tmp/agpod-mcp-tools-list.json


  build_artifacts_agpod_case_server:
    name: Build Artifacts agpod-case-server
    needs: release_please
    if: ${{ needs.release_please.outputs.agpod_case_server_release_created == 'true' }}
    uses: ./.github/workflows/build-artifacts.yml
    with:
      tag_name: ${{ needs.release_please.outputs.agpod_case_server_tag_name }}
      bin_name: agpod-case-server
      smoke_test_command: |
        target/aarch64-apple-darwin/release/agpod-case-server --help > /tmp/agpod-case-server-help.txt
        test -s /tmp/agpod-case-server-help.txt
