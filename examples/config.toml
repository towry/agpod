# Example agpod configuration
# Place this at $XDG_CONFIG_HOME/agpod/config.toml (or ~/.config/agpod/config.toml)
# or .agpod.toml in your project root.

version = "1"

[log]
level = "warning"

[diff]
output_dir = "llm/diff"
large_file_changes_threshold = 100
large_file_lines_threshold = 500
max_consecutive_empty_lines = 2

[case]
server_addr = "127.0.0.1:6142"
auto_start = true
access_mode = "local_server"
semantic_recall_enabled = false
vector_digest_job_enabled = false
# data_dir = "~/.local/share/agpod/case.db"

[case.plugins.honcho]
enabled = false
sync_enabled = true
# base_url = "https://api.honcho.dev"
# workspace_id = "ws_123"
# api_key = "honcho_secret"
# api_key_env = "HONCHO_API_KEY"

[mcp.hive.claude.modes.readonly]
description = "Read-only Claude worker for analysis and review."
command = "claude"
args = ["--dangerously-skip-permissions"]
# settings = "~/.claude/settings.json"
# mcp_config = "~/.claude/generated/mcp-readonly.json"
# env = { MAX_MCP_OUTPUT_TOKENS = "12000" }

[mcp.hive.claude.modes.full]
description = "Full-access Claude worker for implementation."
command = "claude"
args = []
# settings = "~/.claude/settings.json"
# mcp_config = "~/.mcp.json"
# env = {}
